content = "I plan and draft various activities for the Youth League Committee and Student Union, creating PowerPoint presentations. I manage attendance, conduct roll calls for participants, and organize weekly department head meetings, collecting work summaries. I handle budgeting and reimbursement for college activities and coordinate with the school's Youth League Committee and Student Union. Additionally, I lead the award evaluation process within the college, recognizing outstanding individuals such as Communist Youth League members and Student Union leaders."

