title = "the 'Three Down to the Countryside' Social Practice"
subtitle = "Hainan University"
date = "2021.08"
content = "As a member tasked with investigating the plant species in the Dongzhaigang Mangrove Nature Reserve in Haikou, my role is crucial in the ‘Healthy All, Boosting Free Trade Port - Research on the Mangrove Ecosystem in Hainan, China’ project. The project involves the collection of specimens of true mangroves and semi-mangrove plants, as well as the classification and identification of mangrove vegetation. Importantly, the project has received strong support from Hainan University."

